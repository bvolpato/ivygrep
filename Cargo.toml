[package]
name = "ivygrep"
version = "0.1.1"
edition = "2024"
description = "Semantic grep that stays local"
license = "MIT"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
colored = "2.1"
dirs = "6.0"
fs2 = "0.4.3"
grep-matcher = "0.1"
grep-regex = "0.1"
grep-searcher = "0.1"
globset = "0.4"
hex = "0.4"
ignore = "0.4"
notify = "7.0"
once_cell = "1.20"
parking_lot = "0.12"
pluralizer = "0.5"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tantivy = "0.22"
thiserror = "2.0"
tokio = { version = "1.43", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
usearch = "2.24"
uuid = { version = "1.11", features = ["v4", "serde"] }

[dev-dependencies]
assert_cmd = "2.0"
fs_extra = "1.3"
insta = { version = "1.42", features = ["yaml", "redactions"] }
predicates = "3.1"
proptest = "1.6"
serial_test = "3.2"
tempfile = "3.15"
