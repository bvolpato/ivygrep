name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cargo_flags: "--no-default-features"
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
            cargo_flags: "--no-default-features"
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            cargo_flags: "--no-default-features"
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install musl tools (x86_64-linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (aarch64-linux-musl)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu musl-tools
          # Use the GNU cross-linker for musl target (works for static builds)
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_musl=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.cargo_flags }}

      - name: Smoke test (native only)
        if: ${{ !matrix.cross }}
        run: ./target/${{ matrix.target }}/release/ig --help

      - name: Package archive
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE_NAME="ivygrep-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/ig" "dist/${ARCHIVE_NAME}/"
          cp README.md LICENSE* 2>/dev/null "dist/${ARCHIVE_NAME}/" || true
          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          echo "ARCHIVE_PATH=dist/${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Compute SHA256
        shell: bash
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            SHA=$(shasum -a 256 "${{ env.ARCHIVE_PATH }}" | awk '{print $1}')
          else
            SHA=$(sha256sum "${{ env.ARCHIVE_PATH }}" | awk '{print $1}')
          fi
          echo "SHA256=${SHA}" >> $GITHUB_ENV
          echo "${SHA}  ${{ env.ARCHIVE_NAME }}.tar.gz" > "${{ env.ARCHIVE_PATH }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.ARCHIVE_PATH }}.sha256
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.sha256' -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: false

      - name: Compute SHA256 values
        id: sha
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          get_sha() {
            local pattern=$1
            local file=$(find artifacts -name "${pattern}" -path '*.sha256' | head -1)
            if [ -f "$file" ]; then
              awk '{print $1}' "$file"
            else
              # Fallback: compute from the archive
              local archive=$(find artifacts -name "${pattern%.sha256}" | head -1)
              sha256sum "$archive" | awk '{print $1}'
            fi
          }

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_linux_amd64=$(get_sha "ivygrep-${TAG}-x86_64-unknown-linux-musl.tar.gz.sha256")" >> $GITHUB_OUTPUT
          echo "sha_linux_arm64=$(get_sha "ivygrep-${TAG}-aarch64-unknown-linux-musl.tar.gz.sha256")" >> $GITHUB_OUTPUT
          echo "sha_macos_amd64=$(get_sha "ivygrep-${TAG}-x86_64-apple-darwin.tar.gz.sha256")" >> $GITHUB_OUTPUT
          echo "sha_macos_arm64=$(get_sha "ivygrep-${TAG}-aarch64-apple-darwin.tar.gz.sha256")" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: bvolpato/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        shell: bash
        run: |
          cat > homebrew-tap/Formula/ivygrep.rb << 'FORMULA_EOF'
          # typed: false
          # frozen_string_literal: true

          # This file is auto-generated by the ivygrep release workflow. DO NOT EDIT.
          class Ivygrep < Formula
            desc "Semantic grep for codebases — hybrid lexical + vector search, local-only"
            homepage "https://github.com/bvolpato/ivygrep"
            version "${{ steps.sha.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/bvolpato/ivygrep/releases/download/${{ steps.sha.outputs.tag }}/ivygrep-${{ steps.sha.outputs.tag }}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_macos_amd64 }}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/bvolpato/ivygrep/releases/download/${{ steps.sha.outputs.tag }}/ivygrep-${{ steps.sha.outputs.tag }}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_macos_arm64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/bvolpato/ivygrep/releases/download/${{ steps.sha.outputs.tag }}/ivygrep-${{ steps.sha.outputs.tag }}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_linux_amd64 }}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/bvolpato/ivygrep/releases/download/${{ steps.sha.outputs.tag }}/ivygrep-${{ steps.sha.outputs.tag }}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_linux_arm64 }}"
              end
            end

            def install
              bin.install "ig"
            end

            test do
              (testpath/"hello.rs").write('fn hello() -> &str { "world" }')
              system "#{bin}/ig", "--help"
            end
          end
          FORMULA_EOF

      - name: Commit & push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ivygrep.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date, nothing to commit"
          else
            git commit -m "ivygrep ${{ steps.sha.outputs.tag }}: update formula"
            git push
          fi
