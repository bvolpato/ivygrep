name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.archive_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive_name: linux-x86_64-gnu
            archive: tar.gz
            use_cross: false
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive_name: linux-x86_64-musl
            archive: tar.gz
            use_cross: true

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_name: linux-aarch64-gnu
            archive: tar.gz
            use_cross: false
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive_name: linux-aarch64-musl
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            archive_name: macos-x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive_name: macos-aarch64
            archive: tar.gz
          # Windows excluded: usearch (simsimd) doesn't compile on MSVC.

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            if [[ "${{ matrix.target }}" == *"musl"* ]] || [[ "${{ matrix.target }}" == *"x86_64-apple-darwin"* ]]; then
              cross build --release --target ${{ matrix.target }} --no-default-features
            else
              cross build --release --target ${{ matrix.target }}
            fi
          else
            if [[ "${{ matrix.target }}" == *"musl"* ]] || [[ "${{ matrix.target }}" == *"x86_64-apple-darwin"* ]]; then
              cargo build --release --target ${{ matrix.target }} --no-default-features
            else
              cargo build --release --target ${{ matrix.target }}
            fi
          fi
        shell: bash

      - name: Set up QEMU
        if: "contains(matrix.target, 'aarch64') && contains(matrix.runner, 'ubuntu-latest')"
        uses: docker/setup-qemu-action@v3

      - name: Smoke test
        shell: bash
        run: |
          EXE_SUFFIX=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            EXE_SUFFIX=".exe"
          fi
          ./target/${{ matrix.target }}/release/ig${EXE_SUFFIX} --help

      - name: Package archive
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE_NAME="ivygrep-${TAG}-${{ matrix.archive_name }}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          
          EXE_SUFFIX=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            EXE_SUFFIX=".exe"
          fi
          
          cp "target/${{ matrix.target }}/release/ig${EXE_SUFFIX}" "dist/${ARCHIVE_NAME}/"
          cp README.md LICENSE* 2>/dev/null "dist/${ARCHIVE_NAME}/" || true
          cd dist
          
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            zip -r "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}"
            echo "ARCHIVE_PATH=dist/${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
            echo "ARCHIVE_PATH=dist/${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Compute SHA256
        shell: bash
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            SHA=$(shasum -a 256 "${{ env.ARCHIVE_PATH }}" | awk '{print $1}')
          else
            SHA=$(sha256sum "${{ env.ARCHIVE_PATH }}" | awk '{print $1}')
          fi
          echo "SHA256=${SHA}" >> $GITHUB_ENV
          
          # Use proper file extension depending on the generated archive format
          ARCHIVE_EXT="tar.gz"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            ARCHIVE_EXT="zip"
          fi
          echo "${SHA}  ${{ env.ARCHIVE_NAME }}.${ARCHIVE_EXT}" > "${{ env.ARCHIVE_PATH }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.ARCHIVE_PATH }}.sha256
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.zip' -exec cp {} release-assets/ \;
          find artifacts -name '*.sha256' -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Extract Release Notes
        id: extract_notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v ver="\\[${VERSION}\\]" '/^## / { if (p) { exit }; if (index($2, ver)) { p=1; next } } p' CHANGELOG.md > release_notes.md
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.extract_notes.outputs.notes_file }}
          files: release-assets/*
          fail_on_unmatched_files: true

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: false

      - name: Compute SHA256 values
        id: sha
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          get_sha() {
            local pattern=$1
            local file=$(find artifacts -name "${pattern}" -path '*.sha256' | head -1)
            if [ -f "$file" ]; then
              awk '{print $1}' "$file"
            else
              # Fallback: compute from the archive
              local archive=$(find artifacts -name "${pattern%.sha256}" | head -1)
              sha256sum "$archive" | awk '{print $1}'
            fi
          }

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_linux_amd64=$(get_sha "ivygrep-${TAG}-linux-x86_64.tar.gz.sha256")" >> $GITHUB_OUTPUT
          echo "sha_linux_arm64=$(get_sha "ivygrep-${TAG}-linux-aarch64.tar.gz.sha256")" >> $GITHUB_OUTPUT
          echo "sha_macos_amd64=$(get_sha "ivygrep-${TAG}-macos-x86_64.tar.gz.sha256")" >> $GITHUB_OUTPUT
          echo "sha_macos_arm64=$(get_sha "ivygrep-${TAG}-macos-aarch64.tar.gz.sha256")" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: bvolpato/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        shell: bash
        run: |
          cat > homebrew-tap/Formula/ivygrep.rb << 'FORMULA_EOF'
          # typed: false
          # frozen_string_literal: true

          # This file is auto-generated by the ivygrep release workflow. DO NOT EDIT.
          class Ivygrep < Formula
            desc "Semantic grep for codebases — hybrid lexical + vector search, local-only"
            homepage "https://github.com/bvolpato/ivygrep"
            version "${{ steps.sha.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/bvolpato/ivygrep/releases/download/${{ steps.sha.outputs.tag }}/ivygrep-${{ steps.sha.outputs.tag }}-macos-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_macos_amd64 }}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/bvolpato/ivygrep/releases/download/${{ steps.sha.outputs.tag }}/ivygrep-${{ steps.sha.outputs.tag }}-macos-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_macos_arm64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/bvolpato/ivygrep/releases/download/${{ steps.sha.outputs.tag }}/ivygrep-${{ steps.sha.outputs.tag }}-linux-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_linux_amd64 }}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/bvolpato/ivygrep/releases/download/${{ steps.sha.outputs.tag }}/ivygrep-${{ steps.sha.outputs.tag }}-linux-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.sha_linux_arm64 }}"
              end
            end

            def install
              bin.install "ig"
            end

            test do
              (testpath/"hello.rs").write('fn hello() -> &str { "world" }')
              system "#{bin}/ig", "--help"
            end
          end
          FORMULA_EOF

      - name: Commit & push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ivygrep.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date, nothing to commit"
          else
            git commit -m "ivygrep ${{ steps.sha.outputs.tag }}: update formula"
            git push
          fi
