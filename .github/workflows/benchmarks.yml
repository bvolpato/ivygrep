name: Benchmarks

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bench"

      - name: Determine benchmark base
        id: benchmark-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard critical benchmark regressions
        if: steps.benchmark-base.outputs.ref != ''
        run: |
          python3 scripts/benchmark_guard.py \
            --baseline-ref "${{ steps.benchmark-base.outputs.ref }}" \
            --bench-target indexer_bench \
            --bench-name indexer/incremental_reindex_no_change \
            --threshold 1.15

      - name: Install cargo-criterion
        run: cargo install cargo-criterion

      - name: Run benchmarks
        run: cargo criterion --message-format=json > criterion-output.json || true

      - name: Convert Criterion JSON to Custom Benchmark Format
        run: |
          python3 -c '
          import json, sys
          data = []
          for line in open("criterion-output.json"):
              try:
                  obj = json.loads(line.strip())
                  if obj.get("reason") == "benchmark-complete":
                      name = obj.get("id")
                      ns = obj.get("mean", {}).get("estimate", 0)
                      us = round(ns / 1000, 2)
                      data.append({"name": name, "value": us, "unit": "µs"})
              except: pass
          with open("benchmark-data.json", "w") as f:
              json.dump(data, f)
          '


      - name: Restore Cargo.lock
        run: git restore Cargo.lock || true

      - name: Track Benchmarks
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Rust Benchmark
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-data.json

          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@bvolpato'
          comment-always: true
