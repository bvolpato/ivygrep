name: Benchmarks

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bench"

      - name: Install cargo-criterion
        run: cargo install cargo-criterion

      - name: Run benchmarks
        run: cargo criterion --message-format=json > criterion-output.json || true

      - name: Convert Criterion JSON to Custom Benchmark Format
        run: |
          python3 -c '
          import json, sys
          data = []
          for line in open("criterion-output.json"):
              try:
                  obj = json.loads(line.strip())
                  if obj.get("reason") == "benchmark-complete":
                      name = obj.get("id")
                      value = obj.get("mean", {}).get("estimate", 0)
                      data.append({"name": name, "value": value, "unit": "ns"})
              except: pass
          with open("benchmark-data.json", "w") as f:
              json.dump(data, f)
          '


      - name: Track Benchmarks
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Rust Benchmark
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-data.json

          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@bvolpato'
          comment-always: true
