name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  IVYGREP_NO_AUTOSPAWN: "1"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "lint"

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cargo_flags: ""
            rust_flags: "-D warnings -C target-cpu=x86-64-v3"
            name: "Linux (Neural AVX2)"
          - os: ubuntu-latest
            cargo_flags: "--no-default-features"
            rust_flags: "-D warnings"
            name: "Linux (Hash-only)"
          - os: macos-latest
            cargo_flags: "--features accelerate"
            rust_flags: "-D warnings"
            name: "macOS ARM (Neural Accelerate)"
          - os: macos-13
            cargo_flags: "--features accelerate"
            rust_flags: "-D warnings"
            name: "macOS Intel (Neural Accelerate)"
          - os: macos-latest
            cargo_flags: "--no-default-features"
            rust_flags: "-D warnings"
            name: "macOS ARM (Hash-only)"
          # Windows excluded: usearch (simsimd) uses AVX-512 FP16 intrinsics
          # that MSVC doesn't support. IPC layer is cross-platform ready.
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test"

      - name: Run unit & integration tests
        run: cargo test --all-targets ${{ matrix.cargo_flags }} -- --test-threads=4
        env:
          RUSTFLAGS: ${{ matrix.rust_flags }}

  build:
    name: Build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cargo_flags: ""
            rust_flags: "-D warnings -C target-cpu=x86-64-v3"
          - os: ubuntu-latest
            cargo_flags: "--no-default-features"
            rust_flags: "-D warnings"
          - os: macos-latest
            cargo_flags: "--features accelerate"
            rust_flags: "-D warnings"
          - os: macos-13
            cargo_flags: "--features accelerate"
            rust_flags: "-D warnings"
          - os: macos-latest
            cargo_flags: "--no-default-features"
            rust_flags: "-D warnings"
          # Windows excluded: usearch (simsimd) doesn't compile on MSVC.
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"

      - name: Build release binary
        run: cargo build --release ${{ matrix.cargo_flags }}
        env:
          RUSTFLAGS: ${{ matrix.rust_flags }}

      - name: Smoke test
        shell: bash
        run: |
          EXE_SUFFIX=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            EXE_SUFFIX=".exe"
          fi
          
          IG_BIN="$PWD/target/release/ig${EXE_SUFFIX}"
          
          echo "==== Version ===="
          $IG_BIN --version
          
          echo "==== Status ===="
          $IG_BIN status
          
          echo "==== End-to-end Index & Search ===="
          # Create a dummy project
          mkdir -p /tmp/smoketest && cd /tmp/smoketest
          echo "fn smoke_test_marker() { println!(\"Found smoke test\"); }" > main.rs
          
          # Force indexing and a search
          $IG_BIN -e "smoke_test_marker" main.rs
          if ! $IG_BIN -e "smoke_test_marker" main.rs | grep -q "Found smoke test"; then
            echo "Smoke test string not found!"
            exit 1
          fi
