name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  IVYGREP_NO_AUTOSPAWN: "1"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "lint"

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cargo_flags: ""
          - os: macos-latest
            cargo_flags: ""
          # Windows excluded: usearch (simsimd) uses AVX-512 FP16 intrinsics
          # that MSVC doesn't support. IPC layer is cross-platform ready.
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test"

      - name: Run unit & integration tests
        run: cargo test --all-targets ${{ matrix.cargo_flags }}

  build:
    name: Build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cargo_flags: ""
          - os: macos-latest
            cargo_flags: ""
          # Windows excluded: usearch (simsimd) doesn't compile on MSVC.
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"

      - name: Build release binary
        run: cargo build --release ${{ matrix.cargo_flags }}

      - name: Smoke test
        shell: bash
        run: |
          EXE_SUFFIX=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            EXE_SUFFIX=".exe"
          fi
          ./target/release/ig${EXE_SUFFIX} --help
          ./target/release/ig${EXE_SUFFIX} --version
